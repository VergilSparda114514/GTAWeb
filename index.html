<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GTA: EXPLOSIVE STREET WARS - Top Down Mayhem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Orbitron', monospace;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border-radius: 28px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            background: #000;
            padding: 8px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            cursor: crosshair;
            box-shadow: 0 0 0 2px rgba(255,215,0,0.3);
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            text-shadow: 0 2px 4px black;
        }

        .panel {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            border-left: 4px solid #f5a623;
            padding: 8px 18px;
            border-radius: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #ffd966;
            font-size: 1.2rem;
            font-family: monospace;
            box-shadow: 0 5px 12px rgba(0,0,0,0.4);
        }

        .stars {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .star {
            font-size: 1.8rem;
            color: #444;
            text-shadow: none;
            transition: 0.1s ease;
        }

        .star.active {
            color: #ffb347;
            text-shadow: 0 0 6px #ff9900;
        }

        .health-bar {
            width: 180px;
            height: 14px;
            background: #3a1f1f;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 6px;
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: #e34d4d;
            border-radius: 12px;
            transition: width 0.1s;
        }

        .controls-tip {
            position: absolute;
            bottom: 16px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 12px;
            color: #ccc;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 0.5px;
        }

        button {
            pointer-events: auto;
            background: gold;
            border: none;
            padding: 8px 20px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: monospace;
        }
        button:hover {
            background: orange;
            transform: scale(1.02);
        }
        
        .countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.75);
            z-index: 60;
            pointer-events: none;
            font-size: 8rem;
            font-weight: bold;
            color: #ffcc44;
            text-shadow: 0 0 20px red;
            font-family: monospace;
            backdrop-filter: blur(3px);
        }
        
        .start-btn-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 70;
            backdrop-filter: blur(8px);
            border-radius: 20px;
        }
        .start-btn-panel h1 {
            color: gold;
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        .start-btn-panel button {
            font-size: 2rem;
            padding: 12px 36px;
            background: #ff5722;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .start-btn-panel button:hover {
            background: #ffaa33;
            transform: scale(1.05);
        }
        .restart-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #ffbb33;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1600" height="900"></canvas>
    <div class="hud">
        <div class="panel">
            💰 CASH: $<span id="scoreValue">0</span>
        </div>
        <div class="panel stars">
            <span>⭐ WANTED</span>
            <div id="starContainer" style="display: flex; gap: 4px;">
                <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
            </div>
        </div>
        <div class="panel">
            ❤️ HEALTH
            <div class="health-bar"><div class="health-fill" id="healthFill" style="width: 100%"></div></div>
        </div>
    </div>
    <div class="controls-tip">
        🚗 W=FORWARD | S=BACK | A=TURN RIGHT | D=TURN LEFT | 🖱️ CLICK TO SHOOT | 💥 RAM = EXPLOSION
    </div>
    <div id="startScreen" class="start-btn-panel">
        <h1>💥 EXPLOSIVE STREET WARS 💥</h1>
        <button id="mainStartBtn">▶ START MAYHEM ◀</button>
        <p style="margin-top: 20px; color:#aaa;">Ram cops to explode them! Use weapons. Survive the chaos!</p>
    </div>
    <div id="countdownOverlay" class="countdown-overlay" style="display: none;">3</div>
    <button class="restart-btn" id="restartGameBtn">🔁 RESTART MISSION</button>
</div>
<script src="https://unpkg.com/web-audio-daw"></script>
<script>
    (function(){
        // -------------------- CANVAS --------------------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreenDiv = document.getElementById('startScreen');
        const countdownDiv = document.getElementById('countdownOverlay');

        // -------------------- WORLD CONFIG --------------------
        const WORLD_WIDTH = 4500;
        const WORLD_HEIGHT = 4500;
        
        // -------------------- GAME PHASE --------------------
        let gamePhase = 'menu';     // 'menu', 'countdown', 'active', 'gameover', 'exploding'
        let countdownValue = 3;
        let countdownTimer = 0;
        
        // -------------------- GAME STATE --------------------
        let gameRunning = false;
        let lastTimestamp = 0;
        
        // ---- Player (CAR) ----
        let player = {
            x: WORLD_WIDTH/2,
            y: WORLD_HEIGHT/2,
            angle: 0,
            speed: 0,
            maxSpeed: 320,
            accel: 520,
            turnSpeed: 2.9,
            drag: 0.98,
            radius: 22,
            health: 200,
            maxHealth: 200,
            score: 0,
            wantedLevel: 0,
            invincibleTimer: 0
        };
        
        // Effects
        let explosions = [];
        let bloods = [];

        // Sound Effects

        const shoot = new Wad({ source: 'shoot.mp3' });
        const policeShoot = new Wad({ source: 'policeShoot.mp3' });
        const explode = new Wad({ source: 'explode.mp3' });
        const bgm = new Wad({ source: 'bgm.mp3' });
        
        // Entities
        let policeCars = [];
        let pedestrians = [];
        let bullets = [];
        let buildings = [];
        
        // Timers
        let isShooting = false;
        let shootCooldown = 0;
        let policeSpawnTimer = 0;
        let wantedDecayTimer = 0;
        let deathExplosionTimer = 0;
        
        // Camera
        let cameraX = 0, cameraY = 0;
        
        // ----- Input handling: REVERSED turning (A = right, D = left) -----
        const keys = {
            w: false, s: false, a: false, d: false
        };
        
        let mouseX = player.x, mouseY = player.y;
        
        // ---------- HELPERS ----------
        function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
        
        function updateWantedUI() {
            const stars = document.querySelectorAll('.star');
            for(let i=0; i<stars.length; i++) {
                if(i < player.wantedLevel) stars[i].classList.add('active');
                else stars[i].classList.remove('active');
            }
        }
        
        function updateUI() {
            document.getElementById('scoreValue').innerText = player.score;
            const healthPercent = (player.health / player.maxHealth) * 100;
            document.getElementById('healthFill').style.width = Math.max(0, healthPercent) + '%';
            updateWantedUI();
        }
        
        function addScore(amount, isViolent = false) {
            player.score += amount;
            if(isViolent) {
                if(player.wantedLevel < 5) player.wantedLevel++;
                updateWantedUI();
            }
            updateUI();
        }
        
        function addExplosion(x, y) {
            explosions.push({ x: x, y: y, timer: 0.5 });
            explode.play();

            for (let i = 0; i < pedestrians.length; i++) {
                const ped = pedestrians[i];

                if (Math.hypot(ped.x - x, ped.y - y) < 88 + ped.radius) {
                    destroyPedestrian(ped, i);
                    i--;
                }
            }
        }

        function addBlood(x, y) {
            bloods.push({ x: x, y: y, timer: 0.25 });
        }

        function destroyPedestrian(ped, index) {
            addBlood(ped.x, ped.y);
            pedestrians.splice(index, 1);
            addScore(5);
        }
        
        function destroyPoliceCar(cop, index) {
            addExplosion(cop.x, cop.y);
            policeCars.splice(index, 1);
            addScore(20, true);
        }
        
        function damagePlayer(amount) {
            if(gamePhase !== 'active') return;
            if(player.invincibleTimer > 0) return;
            player.health = clamp(player.health - amount, 0, player.maxHealth);
            player.invincibleTimer = 0.4;
            if(player.health <= 0) {
                player.health = 0;
                if(gamePhase === 'active') {
                    gamePhase = 'exploding';
                    deathExplosionTimer = 0.5;
                    addExplosion(player.x, player.y);
                    gameRunning = false;
                    updateUI();
                }
            }
            updateUI();
        }
        
        function spawnPoliceAt(forcedX, forcedY) {
            if(gamePhase !== 'active') return;
            let radius = 18;
            let angle = Math.random() * Math.PI * 2;
            let x, y;
            if(forcedX !== undefined) {
                x = forcedX; y = forcedY;
            } else {
                let offsetX = (Math.random() - 0.5) * 380;
                let offsetY = (Math.random() - 0.5) * 380;
                x = player.x + offsetX;
                y = player.y + offsetY;

                x = clamp(x, 80, WORLD_WIDTH - 80);
                y = clamp(y, 80, WORLD_HEIGHT - 80);
            }

            if (buildings.some((b) => circleRectCollision(x, y, radius, b))) {
                return;
            }

            policeCars.push({
                x: x,
                y: y,
                angle: angle,
                speed: 0,
                radius: radius,
                health: 60,
                shootCooldown: 0,
                maxSpeed: 210,
                accel: 380,
                color: "#2c6e9e",
                id: Math.random()
            });
        }
        
        function spawnPedestrian() {
            let radius = 12;
            let x = clamp(player.x + (Math.random() - 0.5) * 700, 40, WORLD_WIDTH-40);
            let y = clamp(player.y + (Math.random() - 0.5) * 700, 40, WORLD_HEIGHT-40);
            for(let b of buildings) {
                if(circleRectCollision(x, y, radius, b)) return;
            }
            pedestrians.push({
                x: x, y: y, radius: radius, health: 30,
                vx: (Math.random() - 0.5)*50, vy: (Math.random() - 0.5)*50,
                color: "#8b5a2b"
            });
        }
        
        function generateBuildings() {
            let bldgs = [];
            bldgs.push({x: 50, y: 50, w: WORLD_WIDTH-100, h: 30});
            bldgs.push({x: 50, y: WORLD_HEIGHT-80, w: WORLD_WIDTH-100, h: 30});
            bldgs.push({x: 50, y: 50, w: 30, h: WORLD_HEIGHT-100});
            bldgs.push({x: WORLD_WIDTH-80, y: 50, w: 30, h: WORLD_HEIGHT-100});
            for(let i=0;i<70;i++) {
                let w = 55 + Math.random() * 70;
                let h = 55 + Math.random() * 80;
                let x = 200 + Math.random() * (WORLD_WIDTH - 400);
                let y = 200 + Math.random() * (WORLD_HEIGHT - 400);
                let overlap = false;
                for(let ex of bldgs) {
                    if(x < ex.x+ex.w+40 && x+w > ex.x-40 && y < ex.y+ex.h+40 && y+h > ex.y-40) overlap=true;
                }
                if(!overlap && x+w < WORLD_WIDTH-60 && y+h < WORLD_HEIGHT-60 && x>80 && y>80) {
                    bldgs.push({x:x, y:y, w:w, h:h});
                }
            }
            for(let i=0;i<40;i++) {
                let w = 40+Math.random()*55;
                let h = 40+Math.random()*55;
                let x = 100 + Math.random() * (WORLD_WIDTH - w - 100);
                let y = 100 + Math.random() * (WORLD_HEIGHT - h - 100);
                bldgs.push({x:x, y:y, w:w, h:h});
            }
            return bldgs;
        }
        
        function circleRectCollision(cx, cy, r, rect) {
            let closestX = clamp(cx, rect.x, rect.x+rect.w);
            let closestY = clamp(cy, rect.y, rect.y+rect.h);
            let dx = cx - closestX;
            let dy = cy - closestY;
            return (dx*dx + dy*dy) < r*r;
        }
        
        function resolveCircleRect(cx, cy, r, rect, obj) {
            if(!circleRectCollision(cx, cy, r, rect)) return false;
            let closestX = clamp(cx, rect.x, rect.x+rect.w);
            let closestY = clamp(cy, rect.y, rect.y+rect.h);
            let dx = cx - closestX;
            let dy = cy - closestY;
            let dist = Math.hypot(dx,dy);
            let overlap = r - dist;
            if(dist < 0.001) return false;
            let nx = dx/dist;
            let ny = dy/dist;
            obj.x += nx * overlap;
            obj.y += ny * overlap;
            return true;
        }
        
        // ---------- GAME UPDATE (ACTIVE) ----------
        function updateGame(deltaSec) {
            if(gamePhase !== 'active') return;
            let dt = Math.min(deltaSec, 0.033);
            if(player.invincibleTimer > 0) player.invincibleTimer -= dt;
            
            // ----- PLAYER CONTROLS: A = turn RIGHT (clockwise), D = turn LEFT (counter-clockwise) -----
            let acc = 0;
            let turning = 0;
            if(keys.w) acc = 1;
            if(keys.s) acc = -0.75;
            if(keys.a) turning = -1;   // A -> right turn (clockwise, negative angle change)
            if(keys.d) turning = 1;    // D -> left turn (counter-clockwise, positive angle change)
            
            if(acc !== 0) {
                let force = player.accel * acc * dt;
                player.speed += force;
                player.speed = clamp(player.speed, -player.maxSpeed*0.55, player.maxSpeed);
            }
            if(Math.abs(player.speed) > 3) {
                let turnAmount = player.turnSpeed * (player.speed/player.maxSpeed) * turning * dt;
                player.angle += turnAmount;
            }
            player.speed *= (1 - (player.drag * dt * 2));
            if(Math.abs(player.speed) < 0.5) player.speed = 0;
            
            let moveX = Math.cos(player.angle) * player.speed * dt;
            let moveY = Math.sin(player.angle) * player.speed * dt;
            player.x += moveX;
            player.y += moveY;
            player.x = clamp(player.x, 25, WORLD_WIDTH-25);
            player.y = clamp(player.y, 25, WORLD_HEIGHT-25);
            for(let b of buildings) resolveCircleRect(player.x, player.y, player.radius, b, player);
            
            if(shootCooldown > 0) shootCooldown -= dt;
            handleShoot();
            
            // Police AI + ramming explosion
            for (let i = 0; i < policeCars.length; i++) {
                const p = policeCars[i];
                let dx = player.x - p.x;
                let dy = player.y - p.y;
                let distToPlayer = Math.hypot(dx,dy);
                
                // RAMMING: explode police and damage player
                if (distToPlayer < player.radius + p.radius) {
                    destroyPoliceCar(p, i);
                    damagePlayer(18);
                    let anglePush = Math.atan2(player.y - p.y, player.x - p.x);
                    player.x += Math.cos(anglePush) * 24;
                    player.y += Math.sin(anglePush) * 24;
                    i--;
                    continue;
                }
                
                let angleToPlayer = Math.atan2(dy, dx);
                let angleDiff = angleToPlayer - p.angle;
                p.angle += angleDiff * dt * 2.2;
                let targetSpeed = distToPlayer < 180 ? 80 : p.maxSpeed;
                if(p.speed < targetSpeed) p.speed += p.accel * dt;
                else p.speed *= 0.99;
                p.speed = clamp(p.speed, 0, p.maxSpeed);
                let moveXp = Math.cos(p.angle) * p.speed * dt;
                let moveYp = Math.sin(p.angle) * p.speed * dt;
                p.x += moveXp;
                p.y += moveYp;
                p.x = clamp(p.x, 18, WORLD_WIDTH-18);
                p.y = clamp(p.y, 18, WORLD_HEIGHT-18);
                for(let b of buildings) resolveCircleRect(p.x, p.y, p.radius, b, p);
                
                if(p.shootCooldown <= 0 && distToPlayer < 380) {
                    p.shootCooldown = 0.9;
                    let dirX = (player.x - p.x);
                    let dirY = (player.y - p.y);
                    let len = Math.hypot(dirX, dirY);
                    if(len > 0.01) {
                        dirX /= len; dirY /= len;
                        bullets.push({
                            x: p.x + dirX*14, y: p.y + dirY*14, vx: dirX * 420, vy: dirY * 420,
                            radius: 5, owner: "police", damage: 12, life: 2.0
                        });
                        policeShoot.play();
                    }
                } else if(p.shootCooldown > 0) p.shootCooldown -= dt;
            }
            
            // Bullets vs police
            for(let i = 0; i < bullets.length; i++) {
                let b = bullets[i];

                if (b.owner === "player") {
                    for (let j = 0; j < policeCars.length; j++) {
                        let cop = policeCars[j];
                        if(Math.hypot(b.x - cop.x, b.y - cop.y) < b.radius + cop.radius) {
                            destroyPoliceCar(cop, j);
                            bullets.splice(i,1);

                            break;
                        }
                    }

                    for(let k = 0; k < pedestrians.length; k++) {
                        let ped = pedestrians[k];

                        if (Math.hypot(b.x - ped.x, b.y - ped.y) < b.radius + ped.radius) {
                            destroyPedestrian(ped, k);
                            bullets.splice(i,1);

                            break;
                        }
                    }
                }
            }
            
            // Pedestrians
            for (let i = 0; i < pedestrians.length; i++) {
                let ped = pedestrians[i];
                ped.x += ped.vx * dt;
                ped.y += ped.vy * dt;
                ped.x = clamp(ped.x, 12, WORLD_WIDTH-12);
                ped.y = clamp(ped.y, 12, WORLD_HEIGHT-12);
                for (let b of buildings) resolveCircleRect(ped.x, ped.y, ped.radius, b, ped);
                if (Math.hypot(player.x - ped.x, player.y - ped.y) < player.radius + ped.radius) {
                    addBlood(ped.x, ped.y);
                    pedestrians.splice(i,1);
                    addScore(5, true);
                    damagePlayer(-6);
                    i--;
                }
            }
            
            // Bullet movement & collisions
            for(let i=0; i<bullets.length; i++) {
                let b = bullets[i];
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                b.life -= dt;
                if(b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT || b.life <= 0) {
                    bullets.splice(i,1);
                    i--; continue;
                }
                let hitBuilding = false;
                for(let build of buildings) {
                    if(circleRectCollision(b.x, b.y, b.radius, build)) { hitBuilding=true; break; }
                }
                if(hitBuilding) { bullets.splice(i,1); i--; }
                else if(b.owner === "police" && Math.hypot(b.x - player.x, b.y - player.y) < b.radius + player.radius) {
                    damagePlayer(b.damage + player.wantedLevel);
                    bullets.splice(i,1); i--;
                }
            }
            
            // Spawning
            policeSpawnTimer += dt;
            let wantedSpawnDelay = Math.max(1.2, 3.6 - player.wantedLevel * 0.5);
            if(policeSpawnTimer > wantedSpawnDelay && policeCars.length < 50 + player.wantedLevel) {
                policeSpawnTimer = 0;
                let spawnCount = player.wantedLevel >= 3 ? 2 : 1;
                for(let s=0; s<spawnCount; s++) spawnPoliceAt();
            }
            
            if(pedestrians.length < 1000 + player.wantedLevel && Math.random()<0.2) spawnPedestrian();
            
            wantedDecayTimer += dt;
            if(wantedDecayTimer > 8.0 && player.wantedLevel > 0) {
                wantedDecayTimer = 0;
                player.wantedLevel--;
                updateWantedUI();
            }
            
            cameraX = player.x - canvas.width/2;
            cameraY = player.y - canvas.height/2;
            cameraX = clamp(cameraX, 0, WORLD_WIDTH - canvas.width);
            cameraY = clamp(cameraY, 0, WORLD_HEIGHT - canvas.height);
        }
        
        function updateEffects(deltaSec) {
            for(let i = 0; i < explosions.length; i++) {
                explosions[i].timer -= deltaSec;

                if(explosions[i].timer <= 0) {
                    explosions.splice(i,1);
                    i--;
                }
            }

            for(let i = 0; i < bloods.length; i++) {
                bloods[i].timer -= deltaSec;

                if(bloods[i].timer <= 0) {
                    bloods.splice(i, 1);
                    i--;
                }
            }
        }
        
        function updateDeathExplosion(deltaSec) {
            if(gamePhase === 'exploding') {
                deathExplosionTimer -= deltaSec;
                if(deathExplosionTimer <= 0) gamePhase = 'gameover';
            }
        }
        
        // ---------- RENDERING ----------
        function drawWorld() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save();
            ctx.translate(-cameraX, -cameraY);
            
            ctx.fillStyle = "#1e2a2e";
            ctx.fillRect(0,0,WORLD_WIDTH,WORLD_HEIGHT);
            ctx.strokeStyle = "#ffd966";
            ctx.lineWidth = 2;
            for(let i=0;i<WORLD_WIDTH+WORLD_HEIGHT;i+=80){
                ctx.beginPath();
                ctx.setLineDash([20,30]);
                ctx.moveTo(i%WORLD_WIDTH, 0);
                ctx.lineTo(i%WORLD_WIDTH, WORLD_HEIGHT);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i%WORLD_HEIGHT);
                ctx.lineTo(WORLD_WIDTH, i%WORLD_HEIGHT);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            for(let b of buildings) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = "#0080ff";
                ctx.fillRect(b.x+5, b.y+5, b.w-10, 8);
            }
            for(let ped of pedestrians) {
                ctx.fillStyle = "#bc9a6c";
                ctx.beginPath();
                ctx.arc(ped.x, ped.y, ped.radius-2, 0, Math.PI*2);
                ctx.fill();
            }
            for(let cop of policeCars) {
                ctx.save();
                ctx.translate(cop.x, cop.y);
                ctx.rotate(cop.angle);
                ctx.fillStyle = "#2c6e9e";
                ctx.fillRect(-16, -12, 32, 24);
                ctx.fillStyle = "#aaddff";
                ctx.fillRect(-10, -6, 8, 6);
                ctx.fillRect(2, -6, 8, 6);
                ctx.restore();
            }
            // Player car - distinct shape with front arrow
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.beginPath();
            ctx.moveTo(20, -12);
            ctx.lineTo(20, 12);
            ctx.lineTo(-16, 16);
            ctx.lineTo(-16, -16);
            ctx.closePath();
            ctx.fillStyle = "#d64531";
            ctx.fill();
            ctx.fillStyle = "#ffaa33";
            ctx.fillRect(12, -8, 8, 16);
            ctx.fillStyle = "#2c2c2c";
            ctx.fillRect(-18, -6, 6, 12);
            ctx.fillStyle = "#88ccff";
            ctx.fillRect(4, -8, 12, 6);
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(18, -6, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(18, 6, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            
            for(let e of explosions) {
                let alpha = Math.min(1, e.timer * 2);
                let radius = 32 + (0.5 - e.timer) * 56;
                ctx.beginPath();
                ctx.arc(e.x, e.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 80, 40, ${alpha * 0.9})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x, e.y, radius * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 30, ${alpha})`;
                ctx.fill();
            }
            
            for(let b of bloods) {
                let alpha = Math.min(1, b.timer * 2);
                let radius = 16 + (0.25 - b.timer) / 0.25 * 28;
                ctx.beginPath();
                ctx.arc(b.x, b.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 0, 0, ${alpha * 0.9})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(b.x, b.y, radius * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(128, 0, 0, ${alpha})`;
                ctx.fill();
            }
            
            for(let b of bullets) {
                ctx.fillStyle = b.owner === "player" ? "#ffcc44" : "#ff4444";
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
            
            if(gamePhase === 'gameover') {
                ctx.font = "bold 40px monospace";
                ctx.fillStyle = "#ff6666";
                ctx.fillText("💥 CAR EXPLODED 💥", canvas.width/2-200, canvas.height/2-40);
                ctx.font = "24px monospace";
                ctx.fillStyle = "#ffaa66";
                ctx.fillText("GAME OVER - Press RESTART", canvas.width/2-170, canvas.height/2+30);
            }
        }
        
        // ----- SHOOTING -----
        function getMouseWorldPos() {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseCanvasX = (mouseX - rect.left) * scaleX;
            let mouseCanvasY = (mouseY - rect.top) * scaleY;
            return { x: mouseCanvasX + cameraX, y: mouseCanvasY + cameraY };
        }
        
        function handleShoot() {
            if(gamePhase !== 'active') return;
            if(!isShooting) return;
            if(shootCooldown > 0) return;
            const worldPos = getMouseWorldPos();
            let dx = worldPos.x - player.x;
            let dy = worldPos.y - player.y;
            let len = Math.hypot(dx,dy);
            if(len < 0.01) return;
            dx /= len; dy /= len;
            bullets.push({
                x: player.x + dx*24, y: player.y + dy*24,
                vx: dx * 650, vy: dy * 650,
                radius: 6, owner: "player", damage: 45, life: 2.2
            });
            shoot.play();
            shootCooldown = 0.1;
            updateUI();
        }
        
        // ---------- COUNTDOWN & RESET ----------
        function startCountdown() {
            gamePhase = 'countdown';
            countdownValue = 3;
            countdownTimer = 1.0;
            countdownDiv.style.display = 'flex';
            countdownDiv.innerText = '3';
            startScreenDiv.style.display = 'none';
            gameRunning = false;
            explosions = [];
            bloods = [];

            bgm.stop();
            bgm.play();
        }
        
        function resetGameWorld() {
            player = {
                x: WORLD_WIDTH/2,
                y: WORLD_HEIGHT/2,
                angle: 0,
                speed: 0,
                maxSpeed: 320,
                accel: 520,
                turnSpeed: 2.9,
                drag: 0.98,
                radius: 22,
                health: 200,
                maxHealth: 200,
                score: 0,
                wantedLevel: 0,
                invincibleTimer: 0
            };
            policeCars = [];
            pedestrians = [];
            bullets = [];
            explosions = [];
            bloods = [];
            shootCooldown = 0;
            policeSpawnTimer = 0;
            wantedDecayTimer = 0;
            for(let i=0;i<2;i++) spawnPoliceAt(player.x+100+i*90, player.y+70);
            for(let i=0;i<5;i++) spawnPedestrian();
            updateUI();
        }
        
        function startGameAfterCountdown() {
            resetGameWorld();
            gamePhase = 'active';
            gameRunning = true;
            countdownDiv.style.display = 'none';
        }
        
        function updateCountdown(deltaSec) {
            if(gamePhase !== 'countdown') return;
            if(countdownTimer <= 0) {
                countdownTimer = 1.0;
                if(countdownValue > 1) {
                    countdownValue--;
                    countdownDiv.innerText = countdownValue;
                } else {
                    startGameAfterCountdown();
                    return;
                }
            }
            countdownTimer -= deltaSec;
        }
        
        // ---------- EVENT LISTENERS ----------
        function initEventListeners() {
            window.addEventListener('keydown', (e) => {
                let k = e.key.toLowerCase();
                if(keys.hasOwnProperty(k)) {
                    keys[k] = true;
                    e.preventDefault();
                }
                if(k === 'r') {
                    e.preventDefault();
                    if(gamePhase === 'active' || gamePhase === 'gameover' || gamePhase === 'exploding') {
                        startCountdown();
                    }
                }
            });
            window.addEventListener('keyup', (e) => {
                let k = e.key.toLowerCase();
                if(keys.hasOwnProperty(k)) keys[k] = false;
            });
            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            canvas.addEventListener('mousedown', (e) => { isShooting = true; });
            canvas.addEventListener('mouseup', (e) => { isShooting = false; });
            document.getElementById('mainStartBtn').addEventListener('click', () => { startCountdown(); });
            document.getElementById('restartGameBtn').addEventListener('click', () => {
                if(gamePhase !== 'countdown') startCountdown();
            });
        }
        
        // ---- GAME LOOP ----
        let lastFrameTime = performance.now() / 1000;
        function gameLoop() {
            let now = performance.now() / 1000;
            let delta = Math.min(0.033, now - lastFrameTime);
            if(delta > 0.001) {
                if(gamePhase === 'active') {
                    updateGame(delta);
                    updateEffects(delta);
                } else if(gamePhase === 'countdown') {
                    updateCountdown(delta);
                    updateEffects(delta);
                } else if(gamePhase === 'exploding') {
                    updateDeathExplosion(delta);
                    updateEffects(delta);
                } else {
                    updateEffects(delta);
                }
                drawWorld();
            }
            lastFrameTime = now;
            requestAnimationFrame(gameLoop);
        }
        
        buildings = generateBuildings();
        initEventListeners();
        gamePhase = 'menu';
        startScreenDiv.style.display = 'flex';
        countdownDiv.style.display = 'none';
        lastFrameTime = performance.now() / 1000;
        gameLoop();
    })();
</script>
</body>
